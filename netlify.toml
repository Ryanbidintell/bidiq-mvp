[build]
  command = "node scripts/check-app-syntax.js && node scripts/build-takeoff.js"
  publish = "."
  functions = "netlify/functions"

[functions."bc-sync"]
  timeout = 26

[functions."inbound-email-background"]
  timeout = 900

# Hourly poll of prospect folders for new Granola transcripts → auto-fill
# Prospects tab post-call columns. Background function (15-min ceiling) so
# multiple folders can be processed without hitting the sync 60s cap.
[functions."process-transcripts-background"]
  schedule = "0 * * * *"

