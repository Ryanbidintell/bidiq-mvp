[build]
  command = "echo 'No build needed'"
  publish = "."
  functions = "netlify/functions"

[functions."bc-sync"]
  timeout = 26

[functions."inbound-email-background"]
  timeout = 900

[functions."weekly-health-check"]
  schedule = "0 9 * * 1"

[functions."daily-digest"]
  schedule = "0 8 * * *"

[functions."activation-check"]
  schedule = "0 10 * * *"

[functions."conversion-sequence"]
  schedule = "0 11 * * *"

[functions."outcome-reminder"]
  schedule = "0 12 * * *"

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_ENABLED = "false"  # Disabled - secrets in old git history, already removed and rotated

[dev]
  command = ""
  port = 8888
  publish = "."
  autoLaunch = false

# Redirect www to non-www
[[redirects]]
  from = "https://www.bidintell.ai/*"
  to = "https://bidintell.ai/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Route authenticated users to app
[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/auth"
  to = "/auth.html"
  status = 200

[[redirects]]
  from = "/demo"
  to = "/demo.html"
  status = 200

[[redirects]]
  from = "/works-with-plan-rooms"
  to = "/works-with-plan-rooms.html"
  status = 200

[[redirects]]
  from = "/works-with-estimating-tools"
  to = "/works-with-estimating-tools.html"
  status = 200

[[redirects]]
  from = "/works-with-crm"
  to = "/works-with-crm.html"
  status = 200

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
